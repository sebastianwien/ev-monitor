<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="240" fill="white" fill-opacity="0.04"/>
  <circle cx="80"   cy="560" r="180" fill="white" fill-opacity="0.04"/>

  <!-- Lightning bolt icon (heroicons bolt, scaled 7.5x, centered at x=220 y=315) -->
  <!-- Heroicons bolt 24x24: center ≈ (12,12) → translate(220-90, 315-90) = (130, 225) -->
  <circle cx="220" cy="315" r="130" fill="white" fill-opacity="0.10"/>
  <g transform="translate(130, 225) scale(7.5)">
    <path d="M3.75 13.5 L14.25 2.25 L12 10.5 L20.25 10.5 L9.75 21.75 L12 13.5 Z" fill="white"/>
  </g>

  <!-- EV Monitor wordmark -->
  <text x="420" y="255" font-size="82" font-weight="800" fill="white" letter-spacing="-1">EV Monitor</text>
  <text x="422" y="325" font-size="36"  fill="white" fill-opacity="0.85">Ladetagebuch für dein Elektroauto</text>
  <text x="422" y="380" font-size="26"  fill="white" fill-opacity="0.60">Verbrauch tracken · WLTP vergleichen · Community</text>

  <!-- Domain badge -->
  <rect x="422" y="425" width="232" height="42" rx="21" fill="white" fill-opacity="0.15"/>
  <text x="538" y="452" font-size="22" font-weight="500" fill="white" text-anchor="middle">ev-monitor.net</text>
</svg>
