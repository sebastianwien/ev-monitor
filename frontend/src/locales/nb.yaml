announcements:
  consumption_methodology_v1_title: "Hvorfor er forbruket mitt høyere enn tripptelleren?"
  consumption_methodology_v1_body: "Vi har forklart dette i detalj - med ekte tall og hele energikjeden fra nettet til motoren."
  consumption_methodology_v1_cta: "Les mer"
  charging_provider_v1_title: "Nytt: Ladeleverandør og offentlige ladestasjoner"
  charging_provider_v1_body: Du kan nå oppgi om du har ladet ved en offentlig ladestasjon og hvilken nettoperatør (CPO) som står bak den. Legg inn ladetariffen (EMP) under Innstillinger → Ladeleverandør. Skjemaet for loggføring er også forenklet – det er kun kWh og pris som må oppgis.
  charging_provider_v1_cta: Gå til innstillinger
  charging_cards_portfolio_v1_title: "Nytt: Administrer flere ladekort"
  charging_cards_portfolio_v1_body: Du kan nå lagre et ubegrenset antall ladekort og tariffer – EnBW, Maingau, Fastned og flere – samtidig. Når du registrerer en ladesesjon, trykker du for å velge riktig kort, og den siste tariffen som ble brukt på samme sted, foreslås automatisk.
  charging_cards_portfolio_v1_cta: Administrer ladekort
  battery_soh_heatpump_v1_title: Overvåk batteriets tilstand og varmepumpen
  battery_soh_heatpump_v1_body: Du kan nå registrere batteriets helsetilstand (SoH) sammen med en dato. Forbruksberegningene for eldre ladeøkter justeres automatisk – en bil som er fem år gammel hadde større batterikapasitet den gangen. Det finnes også en ny varmepumpeindikator som hjelper til med å kontrollere om vinterforbruksverdiene er realistiske.
  battery_soh_heatpump_v1_cta: Gå til kjøretøy
  survey_premium_april_2026_title: Et raskt spørsmål – 60 sekunder
  survey_premium_april_2026_body: Jeg planlegger en premiumfunksjon for automatisk registrering av kjørelengde. Koble til bilen én gang, så registreres kjøreturene automatisk. Hva synes du?
  survey_premium_april_2026_cta: Til undersøkelsen
  price_suggestion_v1_title: Prisforslag ved innlogging
  price_suggestion_v1_body: "Prisen per kWh fylles nå automatisk inn – basert på den siste ladingen på samme sted. Dette fungerer både hjemme og ved offentlige ladestasjoner. For å gjøre dette mulig er posisjonsnøyaktigheten forbedret: offentlige ladestasjoner lokaliseres med en nøyaktighet på ca. 150 meter, mens private ladinger lokaliseres med en nøyaktighet på ca. 600 meter. Eksakte GPS-koordinater lagres fortsatt ikke."
  consumption_normalization_v1_title: "Mer nøyaktig forbruk: ladetapene er fjernet"
  consumption_normalization_v1_body: "Det viste forbruket ditt (kWh/100 km) gjenspeiler nå det faktiske forbruket fra batteriet under kjøring. Målingene fra Wallbox inkluderer tidligere ladetap fra selve ladeprosessen – disse blir nå automatisk trukket fra (vekselstrømslading: 10 %, likestrømshurtiglading: 5 %). Forbruksverdiene dine vil synke noe og er nå lettere å sammenligne med WLTP og andre datakilder. Kostnadsberegningene påvirkes ikke."
  goe_statistics_fix_v1_title: "go-eCharger: Rettelse av statistikk"
  goe_statistics_fix_v1_body: Dine go-eCharger-økter blir nå registrert riktig i statistikken – inkludert beregninger av kWh, kostnader og forbruk.
  soh_autodetect_v1_title: "Batterihelse oppdages nå automatisk"
  soh_autodetect_v1_body: "Bruker du AutoSync, oppdager EV Monitor nå automatisk batteritilstanden (SoH) fra ladeøktene dine - ingen manuell registrering nødvendig. For manuelle ladeøkter kan du angi 'kWh (kjøretøy)' når du registrerer en lading for å utløse samme beregning. En detaljert forklaring finner du i infoboksen i dashbordet eller kjøretøyadministrasjonen."
  soh_autodetect_v1_cta: "Til kjøretøyet"
  car_reassignment_v1_title: Tilordne økter til et annet kjøretøy
  car_reassignment_v1_body: Har du tilordnet en kjøretur til feil bil? Ikke noe problem – i dashbordet kan du med ett klikk tilordne en hvilken som helst kjøretur (eller en hel gruppe) til et annet kjøretøy.
  autosync_premium_v1_title: "Nytt: EV Monitor AutoSync"
  autosync_premium_v1_body: Koble til bilen én gang, så importeres alle ladinger automatisk til EV Monitor – ingen manuell registrering er nødvendig. Nå tilgjengelig som en pro-funksjon. Støtter 28 merker – blant annet BMW, VW, Mercedes, Audi, Tesla, Hyundai, Volvo, Polestar og mange flere.
  autosync_premium_v1_cta: Les mer
  kwh_primary_formula_v1_title: Mer presis forbruksberegning
  kwh_primary_formula_v1_body: Forbruket ble tidligere beregnet fra SoC-prosenter × nominell kapasitet. BMS-en kalibrerer imidlertid prosentvisningen til den faktiske batterikapasiteten - for batterier med degradering avvek dette fra nominell kapasitet og ga litt for høye verdier. Nå brukes målte kilowattimer direkte, pluss en liten SoC-korreksjon mellom øktene. For eldre batterier kan forskjellen være opptil 2 kWh/100km. Alle verdier er automatisk oppdatert. Jeg har også forklart hvorfor EV Monitor ofte viser mer enn tripptelleren din.
  spritmonitor_raw_refresh_v1_title: "SpritMonitor: Importer rådata på nytt"
  spritmonitor_raw_refresh_v1_body: SpritMonitor-importen har nå en ny knapp for å importere rådata på nytt. Den henter den originale JSON-en fra Sprit-Monitor igjen og oppdaterer den, uten å overskrive dine manuelt korrigerte verdier (kWh, kilometerstand osv.). Dette gjør det mulig for meg å korrigere og forbedre ladeøkter i etterkant, ettersom SpritMonitor-dataformatet ikke er fullt dokumentert.
  net_capacity_v1_title: "Kjøretøydatabasen er oppdatert"
  net_capacity_v1_body: "Kjøretøydatabasen er oppdatert. Netto batterikapasitet er korrigert for noen varianter. Forbruksverdier kan ha endret seg litt som følge av dette."
