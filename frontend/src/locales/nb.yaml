consumption_info:
  trigger: Hvordan beregnes forbruket ditt?
  p1: Forbruket beregnes ut fra <strong>ladet kWh</strong>, <strong>ladetilstand (SoC)</strong> og <strong>kilometerteller</strong> for to påfølgende ladeøkter – alle tre verdiene må være oppgitt i begge oppføringene. Hvis en av dem mangler, kan ikke forbruket for den neste oppføringen beregnes.
  p2_pre: Etter <strong>{minTrips} utregningsbare kjøreturer</strong>, sammenligner vi hver verdi med ditt personlige gjennomsnitt. Før det brukes kjøretøyets WLTP-referanseverdi. Kjøreturer med sterkt avvikende forbruk er
  p2_post: merket – vanligvis et tegn på at det mangler en ladeøkt mellom to oppføringer.
  p4: "<strong>Batterihelse (SoH):</strong> Dette angir hvor mye batteriet ditt har eldet over tid og dermed tapt kapasitet. Med AutoSync leser EV Monitor de faktisk ladede kWh direkte fra kjøretøyet og sammenligner dem med forventet kapasitet basert på ladetilstanden (SoC). Når 5 utregningsbare økter med minst 30% delta i ladeøkten er tilgjengelige, beregnes medianen - for å filtrere ut uteliggere. Du kan også selv legge til nettobeløpet på ladeøkter via det valgfrie feltet <strong>\"kWh (kjøretøy)\"</strong> - det utløser samme beregning."
  methodology_link: "Hvorfor er EV Monitor høyere enn tripptelleren min?"
  p3: "<strong>Ladetap – avhengig av situasjonen:</strong> Ladebokser og ladestasjoner måler strømforbruket ved stikkontakten – inkludert ladetap (varme som genereres under lading, ca. 5–10 %). For <strong>forbruk (kWh/100 km)</strong> blir disse tapene fjernet (AC: 10 %, DC: 5 %), slik at verdien gjenspeiler din faktiske kjøreffektivitet og er sammenlignbar med WLTP. For <strong>kostnader (€/kWh)</strong> blir de med – du har tross alt betalt for dem."
