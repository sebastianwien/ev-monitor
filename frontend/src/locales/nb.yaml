  smartcar_support_hint: Har du spørsmål om oppsettet?
  smartcar_how_title: Hvordan fungerer AutoSync?
  smartcar_how_q1: Hva er Smartcar?
  smartcar_how_a1: AutoSync bruker en tjeneste kalt Smartcar i bakgrunnen – et offisielt grensesnitt som bilprodusentene bruker til å gi apper autorisert tilgang til kjøretøydata. Over 30 produsenter har offisielt godkjent Smartcar, blant annet BMW, Volkswagen, Mercedes og Volvo.
  smartcar_how_q2: Hvorfor gå via en mellommann?
  smartcar_how_a2: Ingen produsenter gir tredjeparter direkte tilgang til kjøretøydata. Smartcar er den godkjente kanalen – de har offisielle samarbeidsavtaler med produsentene og er autorisert til å hente inn data på vegne av bileieren. EV Monitor har ingen direkte forbindelse til bilen din – alt går via Smartcar.
  smartcar_how_q3: Hva skjer når man kobler seg til?
  smartcar_how_a3: "Du blir omdirigert til produsentens påloggingsside – direkte til BMW, Volkswagen, Mercedes osv. Der oppgir du påloggingsopplysningene dine, og det er kun produsenten som ser dem. Verken Smartcar eller EV Monitor får noen gang tilgang til passordet ditt. Produsenten gir deretter Smartcar kun et midlertidig tilgangstoken – det fungerer akkurat som «Logg inn med Google»: du oppgir passordet ditt til Google, ikke til tjenesten som bruker Google. Du kan når som helst trekke tilbake tilgangen direkte hos produsenten eller her."
  smartcar_how_q4: Hva skjer under lading?
  smartcar_how_a4: Så snart en ladeøkt starter og avsluttes, sender Smartcar automatisk dataene til EV Monitor. kWh-tallene hentes direkte fra bilen – noe som gir et mer nøyaktig resultat enn noe estimat. Du trenger ikke å gjøre noe.
  smartcar_how_q5: Må jeg gjøre noe etterpå?
  smartcar_how_a5: Nei. Når forbindelsen er opprettet, kjører alt helt i bakgrunnen.
