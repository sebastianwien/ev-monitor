  smartcar_support_hint: Har du frågor om installationen?
  smartcar_how_title: Hur fungerar AutoSync?
  smartcar_how_q1: Vad är Smartcar?
  smartcar_how_a1: AutoSync använder en tjänst som heter Smartcar i bakgrunden – ett officiellt gränssnitt genom vilket biltillverkare ger appar behörig åtkomst till fordonsdata. Över 30 tillverkare har officiellt godkänt Smartcar, däribland BMW, Volkswagen, Mercedes och Volvo.
  smartcar_how_q2: Varför via en mellanhand?
  smartcar_how_a2: Ingen tillverkare ger tredje part direkt tillgång till fordonsdata. Smartcar är den godkända vägen – de har officiella samarbeten med tillverkarna och är behöriga att få tillgång till data på fordonets ägares vägnar. EV Monitor har ingen direkt koppling till din bil – allt går via Smartcar.
  smartcar_how_q3: Vad händer när man ansluter?
  smartcar_how_a3: "Du kommer att omdirigeras till tillverkarens inloggningssida – direkt till BMW, Volkswagen, Mercedes osv. Där anger du dina inloggningsuppgifter, och endast tillverkaren ser dem. Varken Smartcar eller EV Monitor får någonsin tillgång till ditt lösenord. Tillverkaren ger sedan Smartcar endast en tillfällig åtkomsttoken – det fungerar precis som ”Logga in med Google”: du lämnar ut ditt lösenord till Google, inte till den tjänst som använder Google. Du kan när som helst återkalla åtkomsten direkt hos din tillverkare eller här."
  smartcar_how_q4: Vad händer vid laddning?
  smartcar_how_a4: Så snart en laddningssession påbörjas och avslutas skickar Smartcar automatiskt uppgifterna till EV Monitor. kWh-värdet hämtas direkt från fordonet – vilket är mer exakt än någon uppskattning. Du behöver inte göra någonting.
  smartcar_how_q5: Behöver jag göra något efteråt?
  smartcar_how_a5: Nej. När anslutningen är upprättad sker allt helt i bakgrunden.
