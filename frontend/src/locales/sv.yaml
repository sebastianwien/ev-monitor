consumption_info:
  trigger: Hur beräknas din förbrukning?
  p1: Förbrukningen beräknas utifrån <strong>laddade kWh</strong>, <strong>laddningsnivå (SoC)</strong> och <strong>trippmätare</strong> för två på varandra följande laddningssessioner – alla tre värdena måste finnas med i båda uppgifterna. Om ett av värdena saknas kan förbrukningen för nästa uppgift inte beräknas.
  p2_pre: Efter <strong>{minTrips} utvärderbara resor</strong> jämför vi varje värde med ditt personliga genomsnitt. Innan dess används ditt fordons WLTP-referensvärde. Passager med kraftigt avvikande förbrukning är
  p2_post: markerad – oftast ett tecken på att en laddningssession saknas mellan två poster.
  p4: "<strong>Batterihälsa (SoH):</strong> Detta anger hur mycket ditt batteri har åldrats över åren och därmed förlorat kapacitet. Med AutoSync läser EV Monitor de faktiskt laddade kWh direkt från fordonet och jämför dem med förväntad kapacitet baserat på laddningsnivån (SoC). När 5 utvärderingsbara sessioner med minst 30% delta i laddningssessionen finns tillgängliga beräknas medianen - för att filtrera bort extremvärden. Du kan också själv lägga till nettobeloppet på laddningssessioner via det valfria fältet <strong>\"kWh (fordon)\"</strong> - det utlöser samma beräkning."
  methodology_link: "Varför är EV Monitor högre än min trippdator?"
  p3: "<strong>Laddningsförluster – beror på sammanhanget:</strong> Väggladdare och laddstationer mäter strömmen vid uttaget – inklusive laddningsförluster (värme som alstras under laddning, ca 5–10 %). För <strong>förbrukning (kWh/100 km)</strong> räknas dessa förluster bort (växelström: 10 %, likström: 5 %) så att värdet återspeglar din faktiska köreffektivitet och är jämförbart med WLTP. För <strong>kostnader (€/kWh)</strong> räknas de med – du har ju trots allt betalat för dem."
