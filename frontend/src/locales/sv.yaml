announcements:
  consumption_methodology_v1_title: "Varför är min förbrukning högre än trippdatorn?"
  consumption_methodology_v1_body: "Vi har förklarat detta i detalj - med riktiga siffror och hela energikedjan från elnätet till motorn."
  consumption_methodology_v1_cta: "Läs mer"
  charging_provider_v1_title: "Nytt: Laddningsleverantör och offentliga laddstationer"
  charging_provider_v1_body: Du kan nu ange om du har laddat vid en offentlig laddstation och vilken nätoperatör (CPO) som står bakom den. Ange din laddningstariff (EMP) under Inställningar → Laddningsleverantör. Formuläret för loggposter har också förenklats – endast kWh och pris är obligatoriska uppgifter.
  charging_provider_v1_cta: Gå till inställningar
  charging_cards_portfolio_v1_title: "Nytt: Hantera flera laddningskort"
  charging_cards_portfolio_v1_body: Nu kan du spara ett obegränsat antal laddningskort och tariffer – EnBW, Maingau, Fastned och fler – samtidigt. När du registrerar en laddningssession trycker du för att välja rätt kort, och den senaste tariffen som användes på samma plats föreslås automatiskt.
  charging_cards_portfolio_v1_cta: Hantera laddningskort
  battery_soh_heatpump_v1_title: Övervaka batteriets skick och värmepumpen
  battery_soh_heatpump_v1_body: Nu kan du registrera batteriets hälsotillstånd (SoH) tillsammans med ett datum. Förbrukningsberäkningarna för äldre laddningssessioner justeras automatiskt – en fem år gammal bil hade ju större batterikapacitet då. Det finns också en ny värmepumpsmarkör som underlättar rimlighetskontroller av vinterförbrukningsvärden.
  battery_soh_heatpump_v1_cta: Gå till fordonet
  survey_premium_april_2026_title: En snabb fråga – 60 sekunder
  survey_premium_april_2026_body: Jag planerar en premiumfunktion för automatisk körsträckemätning. Anslut din bil en gång så registreras körningarna automatiskt. Vad tycker du?
  survey_premium_april_2026_cta: Till enkäten
  price_suggestion_v1_title: Prisförslag vid inloggning
  price_suggestion_v1_body: "Priset per kWh fylls nu automatiskt i – baserat på den senaste laddningen på samma plats. Detta fungerar både hemma och vid offentliga laddstationer. För att detta ska vara möjligt har platsnoggrannheten förbättrats: offentliga laddstationer lokaliseras med en noggrannhet på cirka 150 meter, medan privata laddningar lokaliseras med en noggrannhet på cirka 600 meter. Exakta GPS-koordinater sparas fortfarande aldrig."
  consumption_normalization_v1_title: "Mer exakt förbrukning: laddningsförlusterna har eliminerats"
  consumption_normalization_v1_body: "Den visade förbrukningen (kWh/100 km) återspeglar nu den faktiska förbrukningen från batteriet under körning. Wallbox-mätningarna inkluderar tidigare laddningsförluster från själva laddningsprocessen – dessa dras nu automatiskt av (växelströmsladdning: 10 %, likströmssnabbladdning: 5 %). Dina förbrukningsvärden kommer att minska något och är nu bättre jämförbara med WLTP och andra datakällor. Kostnadsberäkningarna påverkas inte."
  goe_statistics_fix_v1_title: "go-eCharger: Korrigering av statistik"
  goe_statistics_fix_v1_body: Dina go-eCharger-sessioner räknas nu korrekt in i statistiken – inklusive kWh, kostnader och förbrukningsberäkningar.
  soh_autodetect_v1_title: "Batterihälsa upptäcks nu automatiskt"
  soh_autodetect_v1_body: "Om du använder AutoSync identifierar EV Monitor nu automatiskt ditt batterihälsotillstånd (SoH) från dina laddningssessioner - ingen manuell inmatning behövs. För manuella sessioner kan du ange 'kWh (fordon)' när du loggar en laddning för att utlösa samma beräkning. En detaljerad förklaring finns i inforutan i instrumentpanelen eller fordonshanteringen."
  soh_autodetect_v1_cta: "Till fordonet"
  car_reassignment_v1_title: Flytta sessioner till ett annat fordon
  car_reassignment_v1_body: Har du tilldelat en session till fel bil? Inga problem – i instrumentpanelen kan du med ett enda klick omfördela vilken session som helst (eller en hel grupp) till ett annat fordon.
  autosync_premium_v1_title: "Nyhet: EV Monitor AutoSync"
  autosync_premium_v1_body: Anslut din bil en gång så importeras alla laddningar automatiskt till EV Monitor – ingen manuell inmatning behövs. Nu tillgängligt som en pro-funktion. Stöd för 28 märken – däribland BMW, VW, Mercedes, Audi, Tesla, Hyundai, Volvo, Polestar och många fler.
  autosync_premium_v1_cta: Läs mer
  kwh_primary_formula_v1_title: Mer exakt förbrukningsberäkning
  kwh_primary_formula_v1_body: Förbrukning beräknades tidigare från SoC-procent × nominell kapacitet. BMS kalibrerar dock sin procentvisning mot den faktiska batterikapaciteten - för batterier med degradering avvek detta från nominell kapacitet och gav något för höga värden. Nu används uppmätta kilowattimmar direkt, plus en liten SoC-korrigering mellan sessionerna. För äldre batterier kan skillnaden vara upp till 2 kWh/100km. Alla värden har uppdaterats automatiskt. Jag har också förklarat varför EV Monitor ofta visar mer än din trippdator.
  spritmonitor_raw_refresh_v1_title: "SpritMonitor: Importera rådata igen"
  spritmonitor_raw_refresh_v1_body: SpritMonitor-importen har nu en ny knapp för att importera rådata igen. Den hämtar den ursprungliga JSON-en från Sprit-Monitor igen och uppdaterar den, utan att skriva över dina manuellt korrigerade värden (kWh, mätarställning osv.). Detta gör det möjligt för mig att i efterhand korrigera och förbättra laddningssessioner, eftersom SpritMonitors dataformat inte är fullt dokumenterat.
  net_capacity_v1_title: "Fordonsdata har uppdaterats"
  net_capacity_v1_body: "Fordonsdatabasen har uppdaterats. Nettobatterikapaciteten har korrigerats för vissa varianter. Förbrukningsvärden kan ha ändrats något som ett resultat."
