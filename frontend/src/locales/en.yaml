  smartcar_how_title: "How does AutoSync work?"
  smartcar_how_q1: "What is Smartcar?"
  smartcar_how_a1: "AutoSync uses a service called Smartcar in the background - an official interface through which vehicle manufacturers grant apps authorised access to vehicle data. Over 30 manufacturers have officially approved Smartcar, including BMW, Volkswagen, Mercedes and Volvo."
  smartcar_how_q2: "Why through a middleman?"
  smartcar_how_a2: "No manufacturer gives third parties direct access to vehicle data. Smartcar is the approved route - they have official partnerships with manufacturers and are authorised to access data on behalf of the vehicle owner. EV Monitor has no direct connection to your car - everything goes through Smartcar."
  smartcar_how_q3: "What happens when connecting?"
  smartcar_how_a3: "You'll be redirected to your manufacturer's login page - directly to BMW, Volkswagen, Mercedes etc. You enter your credentials there, and only your manufacturer sees them. Neither Smartcar nor EV Monitor ever sees your password. The manufacturer then gives Smartcar a temporary access token only - it works just like 'Sign in with Google': you give your password to Google, not the service using Google. You can revoke access at any time directly at your manufacturer or here."
  smartcar_how_q4: "What happens when charging?"
  smartcar_how_a4: "As soon as a charging session begins and ends, Smartcar automatically sends the data to EV Monitor. The kWh come directly from the vehicle - more accurate than any estimate. You don't need to do anything."
  smartcar_how_q5: "Do I need to do anything afterwards?"
  smartcar_how_a5: "No. Once connected, everything runs completely in the background."
