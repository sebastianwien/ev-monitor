consumption_info:
  trigger: "How is your consumption calculated?"
  p1: "Consumption is calculated from <strong>charged kWh</strong>, <strong>state of charge (SoC)</strong> and <strong>odometer</strong> of two consecutive charging sessions - all three values must be present in both entries. If one is missing, consumption for the next entry cannot be calculated."
  p2_pre: "After <strong>{minTrips} evaluable trips</strong>, we compare each value against your personal average. Before that, your vehicle's WLTP reference value is used. Sessions with strongly deviating consumption are"
  p2_post: "flagged - usually a sign that a charging session is missing between two entries."
  p3: "<strong>Charging losses - context-dependent:</strong> Wallboxes and charging stations measure what flows at the socket - including charging losses (heat generated during charging, approx. 5-10%). For <strong>consumption (kWh/100km)</strong>, these losses are removed (AC: 10%, DC: 5%) so the value reflects your actual driving efficiency and is comparable to WLTP. For <strong>costs (€/kWh)</strong>, they stay in - you paid for them after all."

