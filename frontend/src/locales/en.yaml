announcements:
  charging_provider_v1_title: "New: Charging provider & public charging"
  charging_provider_v1_body: "You can now indicate whether you charged at a public station and which network operator (CPO) was behind it. Add your charging tariff (EMP) under Settings → Charging provider. The log entry form has also been simplified - only kWh and price are required."
  charging_provider_v1_cta: "Go to settings"
  charging_cards_portfolio_v1_title: "New: Manage multiple charging cards"
  charging_cards_portfolio_v1_body: "You can now store any number of charging cards and tariffs - EnBW, Maingau, Fastned and more at the same time. When logging a session, tap to select the right card, and the last tariff used at the same location is suggested automatically."
  charging_cards_portfolio_v1_cta: "Manage charging cards"
  battery_soh_heatpump_v1_title: "Track battery health & heat pump"
  battery_soh_heatpump_v1_body: "You can now record your battery's State of Health (SoH) with a date. Consumption calculations for older charging sessions are automatically adjusted - a 5-year-old car had more battery capacity back then. There's also a new heat pump flag that helps with plausibility checks for winter consumption values."
  battery_soh_heatpump_v1_cta: "Go to vehicle"
  survey_premium_april_2026_title: "Quick question - 60 seconds"
  survey_premium_april_2026_body: "I'm planning a premium feature for automatic charge tracking. Connect your car once and sessions come in automatically. What do you think?"
  survey_premium_april_2026_cta: "To the survey"
  price_suggestion_v1_title: "Price suggestion when logging"
  price_suggestion_v1_body: "The price per kWh is now automatically pre-filled - based on the last charging session at the same location. This works both at home and at public chargers. To make this possible, location accuracy has been increased: public chargers are localised to ~150m, private sessions to ~600m. Exact GPS coordinates are still never stored."
  consumption_normalization_v1_title: "More accurate consumption: charging losses removed"
  consumption_normalization_v1_body: "Your displayed consumption (kWh/100km) now reflects true driving consumption from the battery. Wallbox measurements include charging losses from the charging process itself - these are now automatically removed (AC charging: 10%, DC fast charging: 5%). Your consumption values will decrease slightly and are now better comparable with WLTP and other data sources. Cost calculations are not affected."
  goe_statistics_fix_v1_title: "go-eCharger: Statistics fix"
  goe_statistics_fix_v1_body: "Your go-eCharger sessions are now correctly counted in statistics - including kWh, costs and consumption calculations."
  car_reassignment_v1_title: "Reassign sessions to a different vehicle"
  car_reassignment_v1_body: "Assigned a session to the wrong car? No problem - in the dashboard you can reassign any session (or an entire group) to a different vehicle with one click."
  autosync_premium_v1_title: "New: EV Monitor AutoSync"
  autosync_premium_v1_body: "Connect your car once and all charging sessions are automatically imported into EV Monitor - no manual entry needed. Now available as a pro feature. 28 brands supported - including BMW, VW, Mercedes, Audi, Tesla, Hyundai, Volvo, Polestar and many more."
  autosync_premium_v1_cta: "Learn more"

