# Local Development Setup - Only PostgreSQL
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: evmonitor
      POSTGRES_PASSWORD: evmonitor
      POSTGRES_DB: ev_monitor
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evmonitor -d ev_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
