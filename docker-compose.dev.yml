# Local Development Setup - Only PostgreSQL
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: evmonitor
      POSTGRES_PASSWORD: evmonitor
      POSTGRES_DB: ev_monitor
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evmonitor -d ev_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP (backend sendet hier hin)
      - "8025:8025"  # Web UI: http://localhost:8025
    environment:
      MP_MAX_MESSAGES: 100

volumes:
  postgres_data_dev:
