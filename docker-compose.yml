version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecretPassword123}
      POSTGRES_DB: ${POSTGRES_DB:-ev_monitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ev_monitor}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-evmonitor}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecretPassword123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot_etc:
  certbot_var:
  certbot_webroot:
