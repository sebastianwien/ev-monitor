
services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-604800000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS:-true}
      APP_BASE_URL: ${APP_BASE_URL:-https://ev-monitor.net}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-noreply@ev-monitor.net}
      APP_ALERT_EMAIL: ${ALERT_EMAIL:-}
    volumes:
      - car_images:/app/car-images
    depends_on:
      db:
        condition: service_healthy

  connectors-service:
    build:
      context: ../ev-monitor-connectors
      dockerfile: Dockerfile
    restart: always
    environment:
      JAVA_OPTS: "-Xmx384m -Xms192m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ev_connectors
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORE_API_BASE_URL: http://backend:8080
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      TESLA_ENCRYPTION_KEY: ${TESLA_ENCRYPTION_KEY}
      TESLA_FLEET_CLIENT_ID: ${TESLA_FLEET_CLIENT_ID:-}
      TESLA_FLEET_CLIENT_SECRET: ${TESLA_FLEET_CLIENT_SECRET:-}
      TESLA_FLEET_REDIRECT_URI: ${TESLA_FLEET_REDIRECT_URI:-https://ev-monitor.net/api/tesla/fleet/auth/callback}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://ev-monitor.net}
      GOE_ENCRYPTION_KEY: ${GOE_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  wallbox-service:
    build:
      context: ../ev-monitor-wallbox
      dockerfile: Dockerfile
    restart: always
    environment:
      JAVA_OPTS: "-Xmx384m -Xms192m"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ev_monitor_wallbox
      DB_USER: ${WALLBOX_DB_USER:-wallbox_user}
      DB_PASSWORD: ${WALLBOX_DB_PASSWORD}
      EVMONITOR_CORE_URL: http://backend:8080
      EVMONITOR_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://ev-monitor.net,https://www.ev-monitor.net}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_REDDIT_PIXEL_ID: ${VITE_REDDIT_PIXEL_ID:-}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - backend
      - wallbox-service
      - connectors-service

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  car_images:
  certbot_etc:
  certbot_var:
  certbot_webroot:
