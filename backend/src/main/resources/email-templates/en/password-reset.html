<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password - EV Monitor</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px;">
  <div style="max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
    <h1 style="color: #4f46e5; font-size: 26px; margin-bottom: 4px;">EV Monitor</h1>
    <h2 style="color: #1f2937; font-size: 20px; margin-top: 0; font-weight: 600;">Reset your password</h2>
    <p style="color: #6b7280; line-height: 1.7; font-size: 15px;">
      You requested a password reset.<br>
      Click the button below to set a new password.<br>
      The link is valid for <strong>1 hour</strong>.
    </p>
    <div style="text-align: center; margin: 36px 0;">
      <a href="{{resetUrl}}"
         style="display: inline-block; background-color: #4f46e5; color: #ffffff; padding: 14px 36px;
                border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 16px;
                letter-spacing: 0.3px; line-height: 1.4; mso-padding-alt: 14px 36px;">
        Reset password
      </a>
    </div>
    <p style="color: #9ca3af; font-size: 13px; margin-top: 32px; border-top: 1px solid #e5e7eb; padding-top: 16px;">
      If you didn't request a password reset, you can safely ignore this email.<br>
      Your password remains unchanged.
    </p>
  </div>
</body>
</html>
