spring:
  application:
    name: ev-monitor

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ev_monitor}
    username: ${DB_USER:ev_user}
    password: ${DB_PASSWORD:ev_password}
    driver-class-name: org.postgresql.Driver

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=15m
    cache-names:
      - platformStats
      - modelsWithData
      - modelStats

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

jwt:
  secret: ${JWT_SECRET}
  expiration:
    ms: ${JWT_EXPIRATION_MS:604800000}

server:
  port: 8080

# Actuator Security (Default: DISABLED für Prod)
# In dev.yml wird health/info enabled
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: ""  # Keine Endpoints exposed by default

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  mail:
    from: ${APP_MAIL_FROM:noreply@ev-monitor.net}
  alert:
    email: ${APP_ALERT_EMAIL:}
  car-images:
    directory: ${CAR_IMAGES_DIR:/app/car-images}
  security:
    rate-limiting:
      enabled: ${RATE_LIMITING_ENABLED:true}  # Set to false to disable (emergency kill-switch)
  premium:
    enabled: ${PREMIUM_ENABLED:false}

# Sprit-Monitor API Integration
spritmonitor:
  application:
    id: ${SPRITMONITOR_APPLICATION_ID:190e3b1080a39777f369a4e9875df3d7}

# Tesla API Integration
tesla:
  encryption:
    key: ${TESLA_ENCRYPTION_KEY:change-this-32-char-secret-key!!}
  fleet:
    client-id: ${TESLA_FLEET_CLIENT_ID:}
    client-secret: ${TESLA_FLEET_CLIENT_SECRET:}
    redirect-uri: ${TESLA_FLEET_REDIRECT_URI:http://localhost:8080/api/tesla/fleet/auth/callback}

# go-eCharger Cloud API Integration
goe:
  encryption:
    key: ${GOE_ENCRYPTION_KEY:change-this-32-char-secret-key!!}

# Internal Service Token (used by Wallbox Service to authenticate against Core)
internal:
  token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-in-prod}

# Stripe Payment Integration
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  price-id-monthly: ${STRIPE_PRICE_ID_MONTHLY:}
  price-id-yearly: ${STRIPE_PRICE_ID_YEARLY:}
