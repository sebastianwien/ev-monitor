spring:
  application:
    name: ev-monitor

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ev_monitor}
    username: ${DB_USER:ev_user}
    password: ${DB_PASSWORD:ev_password}
    driver-class-name: org.postgresql.Driver

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=4h
    cache-names:
      - platformStats
      - modelsWithData
      - modelStats
      - topModels
      - efficientModels
      - leaderboard

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

jwt:
  secret: ${JWT_SECRET}
  expiration:
    ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8080
  forward-headers-strategy: NATIVE

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    default-models-expand-depth: -1  # Models nicht auto-aufklappen
  default-flat-param-object: true

# Actuator Security (Default: DISABLED für Prod)
# In dev.yml wird health/info enabled
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: "health"
  endpoint:
    health:
      enabled: true
      show-details: never
  metrics:
    web:
      client:
        max-uri-tags: 500  # Höheres Limit für HTTP-Client-Metrics (Open-Meteo Backfill)

evmonitor:
  consumption:
    plausibility:
      absolute-min-kwh-per-100km: 10.0
      absolute-max-kwh-per-100km: 40.0
      wltp-lower-factor: 0.75
      wltp-upper-factor: 2.2
      sigma-multiplier: 2.5
      min-trips-for-statistical: 5
      min-trip-distance-km: 1
      ac-charging-efficiency: 0.90
      dc-charging-efficiency: 0.95

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  mail:
    from: ${APP_MAIL_FROM:noreply@ev-monitor.net}
  github:
    token: ${GITHUB_ISSUE_TOKEN:}
    repo: ${GITHUB_REPO:}
    issues:
      enabled: ${GITHUB_ISSUES_ENABLED:false}
  car-images:
    directory: ${CAR_IMAGES_DIR:/app/car-images}
  security:
    rate-limiting:
      enabled: ${RATE_LIMITING_ENABLED:true}  # Set to false to disable (emergency kill-switch)
  premium:
    enabled: ${PREMIUM_ENABLED:false}

# Sprit-Monitor API Integration
spritmonitor:
  application:
    id: ${SPRITMONITOR_APPLICATION_ID:190e3b1080a39777f369a4e9875df3d7}
  proxy:
    enabled: ${SPRITMONITOR_PROXY_ENABLED:false}
    host: ${SPRITMONITOR_PROXY_HOST:localhost}
    port: ${SPRITMONITOR_PROXY_PORT:1080}

# Tesla API Integration
tesla:
  encryption:
    key: ${TESLA_ENCRYPTION_KEY:change-this-32-char-secret-key!!}

# Internal Service Token (used by Wallbox Service to authenticate against Core)
internal:
  token: ${INTERNAL_SERVICE_TOKEN}

connectors:
  base-url: ${CONNECTORS_BASE_URL:http://connectors-service:8081}

# Tankerkoenig Fuel Price API (kostenloser Key auf creativecommons.tankerkoenig.de)
tankerkoenig:
  api-key: ${TANKERKOENIG_API_KEY:}

# Plausible Analytics
plausible:
  api-key: ${PLAUSIBLE_API_KEY:}
  site-id: ${PLAUSIBLE_SITE_ID:ev-monitor.net}

# Stripe Payment Integration
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  price-id-monthly: ${STRIPE_PRICE_ID_MONTHLY:}
  price-id-yearly: ${STRIPE_PRICE_ID_YEARLY:}
  price-id-monthly-intl: ${STRIPE_PRICE_ID_MONTHLY_INTL:}
  price-id-yearly-intl: ${STRIPE_PRICE_ID_YEARLY_INTL:}
  price-id-monthly-usd: ${STRIPE_PRICE_ID_MONTHLY_USD:}
  price-id-yearly-usd: ${STRIPE_PRICE_ID_YEARLY_USD:}
  price-id-monthly-gbp: ${STRIPE_PRICE_ID_MONTHLY_GBP:}
  price-id-yearly-gbp: ${STRIPE_PRICE_ID_YEARLY_GBP:}
  price-id-monthly-nok: ${STRIPE_PRICE_ID_MONTHLY_NOK:}
  price-id-yearly-nok: ${STRIPE_PRICE_ID_YEARLY_NOK:}
  price-id-monthly-sek: ${STRIPE_PRICE_ID_MONTHLY_SEK:}
  price-id-yearly-sek: ${STRIPE_PRICE_ID_YEARLY_SEK:}
  price-id-monthly-dkk: ${STRIPE_PRICE_ID_MONTHLY_DKK:}
  price-id-yearly-dkk: ${STRIPE_PRICE_ID_YEARLY_DKK:}
  referral-coupon-id: ${STRIPE_REFERRAL_COUPON_ID:}
  referral-reward-cents: ${STRIPE_REFERRAL_REWARD_CENTS:399}

logging:
  file:
    name: ${LOG_FILE:}
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      total-size-cap: 500MB
