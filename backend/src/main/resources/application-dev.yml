# Development Profile Configuration
# Activate with: SPRING_PROFILES_ACTIVE=dev

logging:
  level:
    com:
      evmonitor:
        infrastructure:
          external: DEBUG

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ev_monitor
    username: evmonitor
    password: evmonitor
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true  # Enable to run migrations (V9, V10)

  jpa:
    hibernate:
      ddl-auto: validate  # Validate schema matches entities
    show-sql: false  # Enable SQL logging for dev

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Mailpit – lokaler SMTP-Catcher für Dev (http://localhost:8025 für Web UI)
  # docker run -d --name mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit
  mail:
    host: localhost
    port: 1025

jwt:
  secret: dev-secret-key-CHANGE-IN-PRODUCTION-THIS-MUST-BE-AT-LEAST-64-CHARS-LONG-FOR-HS512-ALGORITHM-12345678901234567890
  expiration:
    ms: 604800000  # 7 days

server:
  port: 8080

# Actuator – nur health für Dev (kein env, beans, mappings etc.)
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# CORS for local dev (Vue dev server on port 5173)
allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:8080

app:
  base-url: http://localhost:5173
  mail:
    from: noreply@ev-monitor.net
  car-images:
    directory: ./car-images-dev
  security:
    rate-limiting:
      enabled: false  # Disabled in dev
  premium:
    enabled: ${PREMIUM_ENABLED:false}

# Sprit-Monitor API Integration
spritmonitor:
  application:
    id: 190e3b1080a39777f369a4e9875df3d7

# Stripe (Dev Placeholders — use real test keys in .env.local)
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  price-id-monthly: ${STRIPE_PRICE_ID_MONTHLY:price_monthly_placeholder}
  price-id-yearly: ${STRIPE_PRICE_ID_YEARLY:price_yearly_placeholder}

# Internal Service Token (dev default — override via INTERNAL_SERVICE_TOKEN env var in prod)
internal:
  token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-in-prod}
