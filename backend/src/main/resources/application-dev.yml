# Development Profile Configuration
# Activate with: SPRING_PROFILES_ACTIVE=dev

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ev_monitor
    username: evmonitor
    password: evmonitor
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false  # Disable in dev, let Hibernate manage schema

  jpa:
    hibernate:
      ddl-auto: update  # Auto-create/update tables in dev mode
    show-sql: false  # Enable SQL logging for dev
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Mailpit – lokaler SMTP-Catcher für Dev (http://localhost:8025 für Web UI)
  # docker run -d --name mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit
  mail:
    host: localhost
    port: 1025

jwt:
  secret: dev-secret-key-CHANGE-IN-PRODUCTION-THIS-MUST-BE-AT-LEAST-64-CHARS-LONG-FOR-HS512-ALGORITHM-12345678901234567890
  expiration:
    ms: 604800000  # 7 days

server:
  port: 8080

# CORS for local dev (Vue dev server on port 5173)
allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:8080

app:
  base-url: http://localhost:5173
  mail:
    from: noreply@ev-monitor.net

# Sprit-Monitor API Integration
spritmonitor:
  application:
    id: 190e3b1080a39777f369a4e9875df3d7
