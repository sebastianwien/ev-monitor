# Test Profile Configuration
# Uses H2 in-memory database for fast local testing
# For CI/CD with Testcontainers, add profile 'testcontainers'

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: false  # Disable Flyway, use Hibernate DDL

  jpa:
    hibernate:
      ddl-auto: create-drop  # Auto-create schema for tests
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-FOR-TESTING-ONLY-MIN-64-CHARS-LONG-HS512-ALGORITHM-1234567890123456789012345678901234567890
  expiration:
    ms: 604800000

allowed:
  origins: http://localhost:8080

app:
  car-images:
    directory: ${java.io.tmpdir}/ev-monitor-test-images
  security:
    rate-limiting:
      enabled: false  # Disabled in tests — all tests share 127.0.0.1, which would exhaust the bucket
  premium:
    enabled: false  # Default: beta mode

stripe:
  secret-key: ""
  webhook-secret: "test-webhook-secret"
  price-id-monthly: "price_test_monthly"
  price-id-yearly: "price_test_yearly"

internal:
  token: test-internal-token
