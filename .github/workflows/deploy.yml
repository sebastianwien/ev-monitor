name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run Backend Tests
        run: |
          cd backend
          ./gradlew test

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Hetzner Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /opt/ev-monitor/ev-monitor
            echo "🔄 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "🗄️  Creating database backup..."
            docker compose exec -T db pg_dump -U evmonitor ev_monitor > backup-$(date +%Y%m%d-%H%M%S).sql || echo "⚠️  Backup failed (DB might not be running yet)"

            echo "🚀 Deploying application..."
            flock -w 180 /tmp/ev-monitor-deploy.lock ./deploy.sh

            echo "✅ Deployment completed at $(date)"

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            echo "⏳ Waiting for backend to become healthy (max 3 minutes)..."
            for i in $(seq 1 18); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ Backend healthy after $((i*10)) seconds"
                exit 0
              fi
              echo "Attempt $i/18 failed, retrying in 10s..."
              sleep 10
            done
            echo "❌ Backend health check failed — dumping logs:"
            cd /opt/ev-monitor/ev-monitor && docker compose logs backend --tail=50
            exit 1
