name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run Backend Tests
        run: |
          cd backend
          ./gradlew test

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        env:
          VITE_REDDIT_PIXEL_ID: ${{ secrets.VITE_REDDIT_PIXEL_ID }}
        run: |
          cd frontend
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Hetzner Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /opt/ev-monitor/ev-monitor
            echo "🔄 Pulling latest changes..."
            git pull origin main

            echo "🗄️  Creating database backup..."
            docker compose exec -T db pg_dump -U evmonitor ev_monitor > backup-$(date +%Y%m%d-%H%M%S).sql || echo "⚠️  Backup failed (DB might not be running yet)"

            echo "🚀 Deploying application..."
            ./deploy.sh

            echo "✅ Deployment completed at $(date)"

      - name: Health Check
        run: |
          echo "⏳ Waiting for deployment to complete (max 5 minutes)..."
          for i in {1..30}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://ev-monitor.net)
            if [ $response -eq 200 ]; then
              echo "✅ Health check passed after $((i*10)) seconds (HTTP $response)"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $response, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 minutes"
          exit 1

      - name: Verify Flyway Migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /opt/ev-monitor/ev-monitor
            echo "📊 Checking Flyway migration status..."
            docker compose logs backend | grep -i "flyway" | tail -20
