name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: evmonitor
          POSTGRES_PASSWORD: evmonitor
          POSTGRES_DB: ev_monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 8025:8025
          - 1025:1025

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Start Backend
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ev_monitor
          SPRING_DATASOURCE_USERNAME: evmonitor
          SPRING_DATASOURCE_PASSWORD: evmonitor
          JWT_SECRET: test-secret-for-ci-only-not-used-in-prod
          INTERNAL_SERVICE_TOKEN: ci-internal-token-not-used-in-prod
          SPRING_MAIL_HOST: localhost
          SPRING_MAIL_PORT: 1025
          FRONTEND_BASE_URL: http://localhost:5173
        run: |
          ./gradlew bootRun &
          echo "Waiting for backend to start..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend ready!"
              exit 0
            fi
            echo -n "."
            sleep 3
          done
          echo "Backend did not start within 120s"
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8080
          MAILPIT_URL: http://localhost:8025
          CI: true
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
